name: Auto Commit
on:
  workflow_dispatch:
  schedule:
    - cron: '52 1 22 4 *'
    - cron: '37 0 23 4 *'
    - cron: '31 0 24 4 *'
    - cron: '59 1 25 4 *'
    - cron: '5 0 26 4 *'
    - cron: '5 0 27 4 *'
    - cron: '36 0 28 4 *'
    - cron: '54 1 29 4 *'
    - cron: '43 0 30 4 *'
    - cron: '35 1 1 5 *'
    - cron: '54 1 2 5 *'
    - cron: '7 13 2 5 *'
    - cron: '43 1 3 5 *'
    - cron: '9 12 3 5 *'
    - cron: '56 1 4 5 *'
    - cron: '24 0 5 5 *'
    - cron: '2 1 6 5 *'
    - cron: '1 1 7 5 *'
    - cron: '48 0 8 5 *'
    - cron: '47 13 8 5 *'
    - cron: '45 0 9 5 *'
    - cron: '32 0 10 5 *'
    - cron: '19 0 11 5 *'
    - cron: '35 0 12 5 *'
    - cron: '24 1 13 5 *'
    - cron: '21 1 14 5 *'
    - cron: '55 0 15 5 *'
    - cron: '6 1 16 5 *'
    - cron: '38 1 17 5 *'
    - cron: '14 0 18 5 *'
    - cron: '24 0 19 5 *'

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Set Git Identity
        run: |
          git config --global user.name "akhilmishra542"
          git config --global user.email "akhilmishra542@users.noreply.github.com"

      - name: Create Single Change
        run: |
          node ./auto_commit_script.js
          git add .
          git commit -m "Auto commit [$(date -u)]"
          git push